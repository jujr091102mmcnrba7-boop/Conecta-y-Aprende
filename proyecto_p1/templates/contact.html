{% extends "base.html" %}

{% block head %}
<style>
.simple-shell {
    max-width: 760px;
    margin: 40px auto;
    padding: 0 18px;
}
.contact-details p {
    margin: 0 0 12px;
    color: #334155;
}
.contact-form {
    display: grid;
    gap: 16px;
    margin-top: 18px;
}
.contact-form label {
    display: grid;
    gap: 8px;
    font-weight: 600;
    color: #1f2937;
}
.contact-form input,
.contact-form textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 14px;
    background: #f8fafc;
    color: #0f172a;
    font-size: .95rem;
}
.contact-form textarea {
    min-height: 160px;
    resize: vertical;
}
.contact-form button {
    width: max-content;
    padding: 12px 20px;
    border: none;
    border-radius: 999px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-size: 1rem;
}
.error-box {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    border-radius: 16px;
    padding: 14px;
    color: #991b1b;
}
</style>
{% endblock %}

{% block content %}
<div class="simple-shell">
    <section>
        <h1>{{ title }}</h1>
        <p>{{ subtitle }}</p>
        <div class="contact-details">
            <p><strong>Correo oficial:</strong> <a href="mailto:{{ email }}">{{ email }}</a></p>
            <p>Completa el formulario y el administrador recibirá tu mensaje en la plataforma.</p>
        </div>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form class="contact-form" action="{{ url_for('contact') }}" method="post">
            <label>
                Nombre
                <input type="text" name="name" value="{{ form_data.name }}" required>
            </label>
            <label>
                Correo electrónico
                <input type="email" name="email" value="{{ form_data.email }}" required>
            </label>
            <label>
                Asunto
                <input type="text" name="subject" value="{{ form_data.subject }}" placeholder="Asunto (opcional)">
            </label>
            <label>
                Mensaje
                <textarea name="message" required>{{ form_data.message }}</textarea>
            </label>
            <button type="submit">Enviar mensaje</button>
        </form>

        <div class="actions" style="margin-top: 24px;">
            <a class="button outline" href="{{ url_for('home') }}">Volver al inicio</a>
        </div>
    </section>
</div>
{% endblock %}
