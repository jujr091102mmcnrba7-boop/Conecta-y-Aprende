{% extends "base.html" %}

{% block content %}
<div class="login-shell">
    <h2>Mi Perfil</h2>
    <div class="profile-info">
        <p><strong>Nombre:</strong> {{ user.nombre }}</p>
        <p><strong>Correo:</strong> {{ user.email }}</p>
        <p><strong>Rol:</strong> {{ user.role|capitalize }}</p>
        <p><strong>Estatus:</strong> {{ 'Activo' if user.active else 'Pendiente' }}</p>
        <p><strong>Registrado desde:</strong> {{ user.created_at }}</p>
    </div>
    <div class="actions">
        <a class="button primary" href="{{ url_for('profile_edit') }}">Editar perfil</a>
        <a class="button outline" href="{{ url_for('home') }}">Volver al inicio</a>
    </div>
</div>
{% endblock %}
